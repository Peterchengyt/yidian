<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>一笔连成画 - Apple Design</title>
<style>
  :root {
    --bg-color: #F2F2F7;
    --surface-color: rgba(255, 255, 255, 0.8);
    --border-color: rgba(0, 0, 0, 0.05);
    --text-primary: #1C1C1E;
    --text-secondary: #8E8E93;
    --accent-blue: #007AFF;
    --accent-blue-glow: rgba(0, 122, 255, 0.4);
    --accent-green: #34C759;
    --cell-empty: #E5E5EA;
    --cell-empty-hover: #D1D1D6;
    --shadow-diffuse: 0 20px 40px rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
    --spring-easing: cubic-bezier(0.4, 0, 0.2, 1);
    --spring-bouncy: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at 50% 0%, #FFFFFF 0%, transparent 70%);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* Main App Container */
  #app {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: transparent;
  }

  @media (min-width: 768px) {
    #app {
      height: 85vh;
      max-height: 800px;
      border-radius: 44px;
      background: var(--surface-color);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow-diffuse), inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
    }
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: env(safe-area-inset-top, 32px) 32px 16px;
    z-index: 10;
  }

  .header-titles {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.8px;
    background: linear-gradient(135deg, #1C1C1E, #3A3A3C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 22px;
    background: #FFFFFF;
    border: 1px solid var(--border-color);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s var(--spring-easing);
  }
  .icon-btn:active { transform: scale(0.92); background: #F2F2F7; }
  .icon-btn svg { width: 22px; height: 22px; fill: var(--text-primary); }

  /* Game Board Area */
  #board-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px 32px;
    touch-action: none;
  }

  #grid {
    display: grid;
    gap: 10px;
    padding: 20px;
    background: #FFFFFF;
    border: 1px solid var(--border-color);
    border-radius: 36px;
    box-shadow: var(--shadow-sm);
  }

  .cell {
    width: 100%;
    aspect-ratio: 1;
    background-color: var(--cell-empty);
    border-radius: 14px;
    transition: transform 0.4s var(--spring-bouncy), background-color 0.2s ease, box-shadow 0.3s ease;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
  }

  .cell.obstacle {
    background-color: transparent;
    box-shadow: none;
    pointer-events: none;
  }

  .cell.filled {
    background-color: var(--accent-blue);
    transform: scale(1.12);
    z-index: 2;
    box-shadow: 0 8px 20px var(--accent-blue-glow), inset 0 2px 4px rgba(255,255,255,0.3);
    border-radius: 16px;
  }

  .cell.start-node::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: #FFFFFF;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* Controls */
  .controls {
    padding: 16px 32px env(safe-area-inset-bottom, 40px);
    display: flex;
    justify-content: center;
  }

  .btn-reset {
    background: #FFFFFF;
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 18px 40px;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s var(--spring-easing);
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }
  .btn-reset:active { transform: scale(0.96); background: #F2F2F7; }

  /* Non-modal Toast Feedback */
  #toast {
    position: absolute;
    top: env(safe-area-inset-top, 24px);
    left: 50%;
    transform: translate(-50%, -150%);
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.05);
    padding: 14px 28px;
    border-radius: 100px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 16px;
    color: var(--text-primary);
    z-index: 100;
    transition: transform 0.6s var(--spring-bouncy), opacity 0.3s;
    opacity: 0;
    pointer-events: none;
  }
  #toast.show {
    transform: translate(-50%, 20px);
    opacity: 1;
  }
  .toast-icon {
    width: 28px; height: 28px;
    background: var(--accent-green);
    border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    color: #fff;
    box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3);
  }

  /* Menu Overlay */
  #menu {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-color);
    z-index: 50;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.5s var(--spring-easing);
  }
  #menu.active { transform: translateY(0); }

  .menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: env(safe-area-inset-top, 32px) 32px 16px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
  }

  .level-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 32px;
    overflow-y: auto;
    align-content: start;
  }

  .lvl-btn {
    aspect-ratio: 1;
    border-radius: 20px;
    background: #FFFFFF;
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    font-size: 20px;
    font-weight: 700;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s var(--spring-easing);
  }
  .lvl-btn:active { transform: scale(0.92); }
  .lvl-btn.locked {
    background: transparent;
    border: 1px dashed rgba(0,0,0,0.1);
    color: var(--text-secondary);
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
  }
  .lvl-btn.current {
    background: var(--accent-blue);
    color: #fff;
    border-color: var(--accent-blue);
    box-shadow: 0 8px 20px var(--accent-blue-glow);
  }

  @media (min-width: 768px) {
    .level-grid { grid-template-columns: repeat(8, 1fr); }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-titles">
      <h1 id="level-title">Level 1</h1>
      <p class="subtitle">One Line Puzzle</p>
    </div>
    <div class="icon-btn" id="btn-menu">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
  </header>

  <div id="board-container">
    <div id="grid"></div>
  </div>

  <div class="controls">
    <button class="btn-reset" id="btn-reset">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      重置
    </button>
  </div>

  <!-- Non-modal Toast -->
  <div id="toast">
    <div class="toast-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <span id="toast-msg">Level Cleared</span>
  </div>

  <!-- Menu Overlay -->
  <div id="menu">
    <div class="menu-header">
      <h1>选择关卡</h1>
      <div class="icon-btn" id="btn-close-menu">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </div>
    </div>
    <div class="level-grid" id="level-grid"></div>
  </div>
</div>

<script>
// --- Game State ---
const TOTAL_LEVELS = 99;
let unlockedLevel = parseInt(localStorage.getItem('oneline_apple_unlocked')) || 1;
let currentLevel = 1;

let levelData = null;
let path = []; // Array of {x, y}
let isDrawing = false;

// --- Level Generator (DFS Hamiltonian Path) ---
function generateLevel(level) {
  let w, h, targetN;
  
  // Difficulty Gradient
  if (level <= 10) {
    w = 3 + Math.floor(Math.random() * 2); // 3 or 4
    h = 4;
    targetN = 8 + Math.floor(level / 2);
  } else if (level <= 40) {
    w = 5; h = 5;
    targetN = 15 + Math.floor((level - 10) / 3);
  } else {
    w = 6 + Math.floor(Math.random() * 2); // 6 or 7
    h = 6 + Math.floor(Math.random() * 2);
    targetN = 25 + Math.floor((level - 40) / 3);
  }

  targetN = Math.min(targetN, w * h - 1);

  let bestPath = [];
  
  // Try to generate a valid path
  for (let attempt = 0; attempt < 300; attempt++) {
    let startX = Math.floor(Math.random() * w);
    let startY = Math.floor(Math.random() * h);
    let tempPath = [{x: startX, y: startY}];
    let visited = new Set([`${startX},${startY}`]);

    function dfs(cx, cy) {
      if (tempPath.length === targetN) return true;
      
      let dirs = [[0,1], [1,0], [0,-1], [-1,0]];
      dirs.sort(() => Math.random() - 0.5); // Randomize

      for (let [dx, dy] of dirs) {
        let nx = cx + dx, ny = cy + dy;
        if (nx >= 0 && nx < w && ny >= 0 && ny < h && !visited.has(`${nx},${ny}`)) {
          visited.add(`${nx},${ny}`);
          tempPath.push({x: nx, y: ny});
          if (dfs(nx, ny)) return true;
          tempPath.pop();
          visited.delete(`${nx},${ny}`);
        }
      }
      return false;
    }

    if (dfs(startX, startY)) {
      bestPath = tempPath;
      break;
    }
  }

  // Create board matrix (1 = playable, 0 = obstacle)
  let board = Array(h).fill(0).map(() => Array(w).fill(0));
  bestPath.forEach(p => { board[p.y][p.x] = 1; });

  return { w, h, board, start: bestPath[0], total: targetN };
}

// --- Rendering ---
const gridEl = document.getElementById('grid');

function renderBoard() {
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${levelData.w}, 1fr)`;
  
  // Calculate cell size to fit container
  const containerW = document.getElementById('board-container').clientWidth - 48;
  const containerH = document.getElementById('board-container').clientHeight - 48;
  const maxCellW = (containerW - (levelData.w - 1) * 8 - 32) / levelData.w;
  const maxCellH = (containerH - (levelData.h - 1) * 8 - 32) / levelData.h;
  const cellSize = Math.min(maxCellW, maxCellH, 60); // Max 60px
  
  gridEl.style.width = `${cellSize * levelData.w + (levelData.w - 1) * 8 + 32}px`;

  for (let y = 0; y < levelData.h; y++) {
    for (let x = 0; x < levelData.w; x++) {
      let cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      
      if (levelData.board[y][x] === 0) {
        cell.classList.add('obstacle');
      } else if (x === levelData.start.x && y === levelData.start.y) {
        cell.classList.add('start-node');
      }
      
      gridEl.appendChild(cell);
    }
  }
}

function updateVisuals() {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('filled'));
  path.forEach(p => {
    let cell = document.querySelector(`.cell[data-x="${p.x}"][data-y="${p.y}"]`);
    if (cell) cell.classList.add('filled');
  });
}

// --- Interaction Logic ---
function getCellFromEvent(e) {
  let clientX = e.clientX || (e.touches && e.touches[0].clientX);
  let clientY = e.clientY || (e.touches && e.touches[0].clientY);
  if (!clientX || !clientY) return null;
  
  let el = document.elementFromPoint(clientX, clientY);
  if (el && el.classList.contains('cell') && !el.classList.contains('obstacle')) {
    return { x: parseInt(el.dataset.x), y: parseInt(el.dataset.y) };
  }
  return null;
}

function handlePointerDown(e) {
  let cell = getCellFromEvent(e);
  if (!cell) return;

  // Must start at the designated start node if path is empty
  if (path.length === 0) {
    if (cell.x === levelData.start.x && cell.y === levelData.start.y) {
      isDrawing = true;
      path.push(cell);
      updateVisuals();
    }
  } else {
    // If clicking on the last node, resume drawing
    let last = path[path.length - 1];
    if (cell.x === last.x && cell.y === last.y) {
      isDrawing = true;
    }
  }
}

function handlePointerMove(e) {
  if (!isDrawing) return;
  e.preventDefault(); // Prevent scrolling

  let cell = getCellFromEvent(e);
  if (!cell) return;

  let last = path[path.length - 1];
  if (!last) return;

  // If moved to a different cell
  if (cell.x !== last.x || cell.y !== last.y) {
    // Check Backtracking (Undo)
    if (path.length > 1) {
      let prev = path[path.length - 2];
      if (cell.x === prev.x && cell.y === prev.y) {
        path.pop();
        updateVisuals();
        return;
      }
    }

    // Check Adjacency (must be up/down/left/right)
    let dx = Math.abs(cell.x - last.x);
    let dy = Math.abs(cell.y - last.y);
    if (dx + dy === 1) {
      // Check if already visited
      let visited = path.some(p => p.x === cell.x && p.y === cell.y);
      if (!visited) {
        path.push(cell);
        updateVisuals();
        checkWin();
      }
    }
  }
}

function handlePointerUp() {
  isDrawing = false;
}

function checkWin() {
  if (path.length === levelData.total) {
    isDrawing = false;
    
    // Save progress
    if (currentLevel >= unlockedLevel && currentLevel < TOTAL_LEVELS) {
      unlockedLevel = currentLevel + 1;
      localStorage.setItem('oneline_apple_unlocked', unlockedLevel);
    }

    // Non-modal Feedback
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = `Level ${currentLevel} Cleared`;
    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
      if (currentLevel < TOTAL_LEVELS) {
        loadLevel(currentLevel + 1);
      } else {
        loadLevel(1);
      }
    }, 1500);
  }
}

// --- Game Flow ---
function loadLevel(lv) {
  currentLevel = lv;
  document.getElementById('level-title').textContent = `Level ${lv}`;
  levelData = generateLevel(lv);
  path = [];
  isDrawing = false;
  renderBoard();
  buildMenu();
}

function buildMenu() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    let btn = document.createElement('div');
    btn.className = `lvl-btn ${i > unlockedLevel ? 'locked' : ''} ${i === currentLevel ? 'current' : ''}`;
    btn.textContent = i;
    
    if (i <= unlockedLevel) {
      btn.onclick = () => {
        loadLevel(i);
        document.getElementById('menu').classList.remove('active');
      };
    }
    grid.appendChild(btn);
  }
}

// --- Event Listeners ---
window.addEventListener('resize', () => {
  if (levelData) renderBoard();
  updateVisuals();
});

const boardContainer = document.getElementById('board-container');
boardContainer.addEventListener('mousedown', handlePointerDown);
boardContainer.addEventListener('mousemove', handlePointerMove);
window.addEventListener('mouseup', handlePointerUp);

boardContainer.addEventListener('touchstart', handlePointerDown, {passive: false});
boardContainer.addEventListener('touchmove', handlePointerMove, {passive: false});
window.addEventListener('touchend', handlePointerUp);

document.getElementById('btn-reset').onclick = () => {
  path = [];
  updateVisuals();
};

document.getElementById('btn-menu').onclick = () => {
  document.getElementById('menu').classList.add('active');
};

document.getElementById('btn-close-menu').onclick = () => {
  document.getElementById('menu').classList.remove('active');
};

// Init
loadLevel(currentLevel);

</script>
</body>
</html>
